<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>The Nuus — Daily news, curated</title>
  <meta name="description" content="The most important stories of the day, selected and curated by AI. Clear, concise, no noise.">
  <link rel="canonical" href="https://thenuus.com/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://thenuus.com/">
  <meta property="og:site_name" content="The Nuus">
  <meta property="og:title" content="The Nuus — Daily news, curated">
  <meta property="og:description" content="The most important stories of the day, selected and curated by AI. Clear, concise, no noise.">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="The Nuus — Daily news, curated">
  <meta name="twitter:description" content="The most important stories of the day, selected and curated by AI. Clear, concise, no noise.">

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;900&family=Newsreader:ital,opsz,wght@1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","name":"The Nuus","url":"https://thenuus.com","description":"The most important stories of the day, selected and curated by AI. Clear, concise, no noise."}</script>
</head>
<body>

  <header class="masthead">
    <div class="util-bar">
      <span class="util-date" id="util-date"></span>
      <span class="util-center">Today's 5-minute read</span>
      <div class="util-links">
        <a href="#subscribe-form">Subscribe</a>
        <a href="/archive">Archive</a>
      </div>
    </div>
    <div class="masthead-block">
      <div class="eyebrow">
        <span class="eyebrow-rule"></span>
        <span class="eyebrow-label">Est. 2026 · Daily Edition</span>
        <span class="eyebrow-rule"></span>
      </div>
      <h1 class="site-name" id="site-name" role="link" tabindex="0">The Nuus</h1>
      <p class="masthead-tagline">Serving you bite-sized news, every day.</p>
    </div>
  </header>

  <main class="feed" id="feed">
    <div class="state-message"><p>Loading&hellip;</p></div>
  </main>

  <section class="subscribe-section">
    <form class="subscribe-form" id="subscribe-form">
      <label class="subscribe-label" for="subscribe-email">Get the daily digest in your inbox</label>
      <div class="subscribe-row">
        <input class="subscribe-input" id="subscribe-email" type="email" placeholder="you@example.com" required autocomplete="email">
        <button class="subscribe-btn" type="submit">Subscribe</button>
      </div>
      <p class="subscribe-msg" id="subscribe-msg" aria-live="polite"></p>
    </form>
  </section>

  <footer class="footer">
    <p>The Nuus: Curated daily</p>
    <nav class="footer-nav">
      <a href="/archive">Archive</a>
      <a href="/about">About</a>
    </nav>
  </footer>

  <script src="/app.js"></script>
  <script>
    document.getElementById('subscribe-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('subscribe-email').value;
      const msg = document.getElementById('subscribe-msg');
      const btn = e.target.querySelector('button');

      btn.disabled = true;
      btn.textContent = 'Subscribing…';
      msg.textContent = '';
      msg.className = 'subscribe-msg';

      try {
        const res = await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        let data = {};
        try { data = await res.json(); } catch {}
        if (res.ok) {
          msg.textContent = 'You\'re subscribed. See you tomorrow.';
          msg.classList.add('subscribe-msg--success');
          e.target.reset();
        } else {
          throw new Error(data.error || `Error ${res.status} — please try again`);
        }
      } catch (err) {
        msg.textContent = err.message;
        msg.classList.add('subscribe-msg--error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Subscribe';
      }
    });
  </script>
</body>
</html>
