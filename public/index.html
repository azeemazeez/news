<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Brief</title>
  <meta name="description" content="What happened today, why it matters.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <header class="masthead">
    <div class="masthead-inner">
      <span class="site-name" id="site-name" role="link" tabindex="0">The Brief</span>
    </div>
  </header>

  <div class="date-bar">
    <span class="date-display" id="date-display">Loading&hellip;</span>
    <nav class="date-nav" aria-label="Date navigation">
      <button id="prev-btn" disabled aria-label="Previous day">&larr; Previous</button>
      <button id="next-btn" disabled aria-label="Next day">Next &rarr;</button>
    </nav>
  </div>

  <main class="feed" id="feed">
    <div class="state-message"><p>Loading&hellip;</p></div>
  </main>

  <footer class="footer">
    <p>Curated daily</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
