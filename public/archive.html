<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Archive — The Nuus</title>
  <meta name="description" content="Browse all past editions of The Nuus.">
  <link rel="canonical" href="https://thenuus.com/archive">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://thenuus.com/archive">
  <meta property="og:site_name" content="The Nuus">
  <meta property="og:title" content="Archive — The Nuus">
  <meta property="og:description" content="Browse all past editions of The Nuus.">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Archive — The Nuus">
  <meta name="twitter:description" content="Browse all past editions of The Nuus.">

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Inter:wght@400;500;600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"CollectionPage","name":"Archive — The Nuus","url":"https://thenuus.com/archive","isPartOf":{"@type":"WebSite","name":"The Nuus","url":"https://thenuus.com"}}</script>
</head>
<body>

  <header class="masthead">
    <div class="masthead-inner">
      <a class="site-name" href="/">The Nuus</a>
    </div>
  </header>

  <main class="feed" id="feed">
    <div class="state-message"><p>Loading&hellip;</p></div>
  </main>

  <footer class="footer">
    <p>The Nuus: Curated daily</p>
    <nav class="footer-nav">
      <a href="/archive">Archive</a>
      <a href="/about">About</a>
    </nav>
  </footer>

  <script>
    const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    function renderCalendar(year, mon, dateSet) {
      const label = new Date(year, mon - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      const firstDay = new Date(year, mon - 1, 1).getDay();
      const daysInMonth = new Date(year, mon, 0).getDate();

      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = `${year}-${String(mon).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        cells.push({ d, iso, has: dateSet.has(iso) });
      }
      while (cells.length % 7 !== 0) cells.push(null);

      const headers = DAY_NAMES.map(n => `<th class="cal-th">${n}</th>`).join('');
      let rows = '';
      for (let i = 0; i < cells.length; i += 7) {
        const tds = cells.slice(i, i + 7).map(c => {
          if (!c) return '<td class="cal-empty"></td>';
          if (c.has) return `<td class="cal-day cal-active"><a class="cal-link" href="/?d=${c.iso}">${c.d}</a></td>`;
          return `<td class="cal-day cal-dim">${c.d}</td>`;
        }).join('');
        rows += `<tr>${tds}</tr>`;
      }

      return `
        <div class="archive-group">
          <p class="archive-month">${label}</p>
          <table class="cal-table">
            <thead><tr>${headers}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    async function init() {
      const feed = document.getElementById('feed');
      try {
        const res = await fetch('/data/manifest.json?t=' + Date.now());
        const manifest = await res.json();

        if (!manifest.dates || manifest.dates.length === 0) {
          feed.innerHTML = '<div class="state-message"><p>No editions yet.</p></div>';
          return;
        }

        const dateSet = new Set(manifest.dates);

        // Group by year-month
        const groups = {};
        for (const date of manifest.dates) {
          const [year, mon] = date.split('-').map(Number);
          const key = `${year}-${String(mon).padStart(2, '0')}`;
          if (!groups[key]) groups[key] = { year, mon };
        }

        feed.innerHTML = Object.keys(groups)
          .sort((a, b) => b.localeCompare(a))
          .map(k => renderCalendar(groups[k].year, groups[k].mon, dateSet))
          .join('');

        const itemList = {
          '@context': 'https://schema.org',
          '@type': 'ItemList',
          name: 'The Nuus — Archive',
          url: 'https://thenuus.com/archive',
          numberOfItems: manifest.dates.length,
          itemListElement: manifest.dates.map((d, i) => ({
            '@type': 'ListItem',
            position: i + 1,
            url: `https://thenuus.com/?d=${d}`,
            name: `The Nuus — ${d}`,
          })),
        };
        const script = document.createElement('script');
        script.type = 'application/ld+json';
        script.textContent = JSON.stringify(itemList);
        document.head.appendChild(script);
      } catch (e) {
        feed.innerHTML = '<div class="state-message"><p>Could not load archive.</p></div>';
      }
    }

    init();
  </script>
</body>
</html>
